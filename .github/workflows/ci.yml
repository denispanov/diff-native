name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-07-16
        with:
          toolchain: 1.97.1
          targets: wasm32-unknown-unknown
          components: clippy
      
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.15.0 --locked
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bun run playwright install --with-deps chromium

      - name: Typecheck (bench)
        run: bun run bench:build
      
      - name: Build
        run: bun run build

      - name: Verify package entries
        run: bun run test:package

      - name: Verify browser and ESM artifacts
        run: bun run test:browser
      
      - name: Check code quality
        run: bun run check
      
      - name: Run tests
        run: bun test
      
      - name: Run Rust tests
        run: bun run test:rust
